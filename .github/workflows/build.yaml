name: 构建

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Tauri 应用位于仓库根目录。
env:
  APP_DIR: .

jobs:
  # ---------- 桌面端：Windows / macOS 生产包 ----------
  desktop:
    name: 构建桌面 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            artifact: kenkomqtt-macos
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            artifact: kenkomqtt-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: 安装 Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ env.APP_DIR }}/pnpm-lock.yaml

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.APP_DIR }}/src-tauri -> target

      - name: 安装前端依赖
        working-directory: ${{ env.APP_DIR }}
        run: pnpm install

      - name: 构建 Tauri 生产包
        working-directory: ${{ env.APP_DIR }}
        run: pnpm tauri build --target ${{ matrix.rust_target }}

      - name: 上传产物
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            ${{ env.APP_DIR }}/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
            ${{ env.APP_DIR }}/src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/*.app
            ${{ env.APP_DIR }}/src-tauri/target/${{ matrix.rust_target }}/release/bundle/msi/*.msi
            ${{ env.APP_DIR }}/src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe

  # ---------- Android 生产 APK ----------
  android:
    name: 构建 Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: 安装 JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: 安装 Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ env.APP_DIR }}/pnpm-lock.yaml

      - name: 安装 Rust (Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.APP_DIR }}/src-tauri -> target

      - name: 配置 Android NDK 环境
        run: echo "NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"

      - name: 安装前端依赖
        working-directory: ${{ env.APP_DIR }}
        run: pnpm install

      - name: 初始化 Android 工程
        working-directory: ${{ env.APP_DIR }}
        run: pnpm tauri android init

      - name: 构建 Android 生产 APK
        working-directory: ${{ env.APP_DIR }}
        run: pnpm tauri android build --apk

      - name: 生成签名密钥并签名 APK
        run: |
          set -e
          KS="$RUNNER_TEMP/ci.jks"
          keytool -genkeypair -v -keystore "$KS" -alias ci -keyalg RSA -keysize 2048 \
            -validity 3650 -storepass android -keypass android \
            -dname "CN=KenkoMQTT CI, O=KenkoMQTT"
          BT="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)"
          UNSIGNED="$(find "$APP_DIR/src-tauri/gen/android" -path '*release*' -name '*-unsigned.apk' | head -1)"
          echo "unsigned apk: $UNSIGNED"
          test -n "$UNSIGNED"
          "$BT/apksigner" sign --ks "$KS" --ks-pass pass:android --ks-key-alias ci \
            --key-pass pass:android --out "$RUNNER_TEMP/kenkomqtt-android.apk" "$UNSIGNED"
          "$BT/apksigner" verify "$RUNNER_TEMP/kenkomqtt-android.apk"

      - name: 上传产物
        uses: actions/upload-artifact@v7
        with:
          name: kenkomqtt-android
          if-no-files-found: error
          path: ${{ runner.temp }}/kenkomqtt-android.apk

  # ---------- iOS 构建（无签名：模拟器 .app）----------
  # 说明：Tauri 的 iOS 生产构建必须走 `tauri ios build`（原始 xcodebuild 会进 dev 路径、依赖 dev server）。
  # 真机 .ipa 的 export 步骤需要签名证书；无 secrets 时只能产出「模拟器 .app」这种免签名产物。
  # 要 CI 直接出可安装到真机的签名 .ipa，需把证书(.p12)+描述文件放 GitHub Secrets 再签（见 README）。
  ios:
    name: 构建 iOS (模拟器·免签名)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: 安装 Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ env.APP_DIR }}/pnpm-lock.yaml

      - name: 安装 Rust (iOS 模拟器 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.APP_DIR }}/src-tauri -> target

      - name: 准备 iOS 构建依赖
        run: brew install xcodegen libimobiledevice

      - name: 安装前端依赖
        working-directory: ${{ env.APP_DIR }}
        run: pnpm install

      - name: 初始化 iOS 工程
        working-directory: ${{ env.APP_DIR }}
        run: pnpm tauri ios init

      - name: 构建模拟器 .app（免签名）
        working-directory: ${{ env.APP_DIR }}
        run: pnpm tauri ios build --target aarch64-sim

      - name: 打包 .app
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -euo pipefail
          APP="$(find src-tauri/gen/apple/build -name '*.app' -type d -path '*sim*' | head -1)"
          echo "app=$APP"
          test -n "$APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$RUNNER_TEMP/KenkoMQTT-iossim.app.zip"

      - name: 上传产物
        uses: actions/upload-artifact@v7
        with:
          name: kenkomqtt-ios-simulator
          if-no-files-found: error
          path: ${{ runner.temp }}/KenkoMQTT-iossim.app.zip
