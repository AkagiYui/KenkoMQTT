name: 构建

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# 新推送自动取消同分支进行中的旧构建，避免重复占用
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Tauri 应用位于仓库根目录。
env:
  APP_DIR: .

jobs:
  # ---------- 桌面端：便携产物（macOS .app / Windows .exe，不打安装包） ----------
  # macOS: universal / arm64 / intel(x86_64)，各出便携 .app；Windows: x64 / arm64 / x86，各出便携 .exe。
  desktop:
    name: 构建桌面 ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-universal
            os: macos-latest
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - label: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
          - label: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin
          - label: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
          - label: windows-x86
            os: windows-latest
            target: i686-pc-windows-msvc
            rust_targets: i686-pc-windows-msvc
          - label: windows-arm64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            rust_targets: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: 安装 Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ env.APP_DIR }}/pnpm-lock.yaml

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.APP_DIR }}/src-tauri -> target
          key: ${{ matrix.label }}

      - name: 安装前端依赖
        working-directory: ${{ env.APP_DIR }}
        run: pnpm install

      - name: 构建便携产物（macOS 仅 .app / Windows 仅 .exe）
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "macOS" ]; then
            pnpm tauri build --target ${{ matrix.target }} --bundles app
          else
            pnpm tauri build --target ${{ matrix.target }} --no-bundle
          fi

      - name: 收集便携产物
        working-directory: ${{ env.APP_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/out"; mkdir -p "$OUT"
          if [ "$RUNNER_OS" = "macOS" ]; then
            APP="$(find "src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -name '*.app' -type d | head -1)"
            echo "app=$APP"; test -n "$APP"
            ditto -c -k --sequesterRsrc --keepParent "$APP" "$OUT/KenkoMQTT-${{ matrix.label }}.app.zip"
          else
            EXE="$(find "src-tauri/target/${{ matrix.target }}/release" -maxdepth 1 -name '*.exe' | head -1)"
            echo "exe=$EXE"; test -n "$EXE"
            cp "$EXE" "$OUT/KenkoMQTT-${{ matrix.label }}.exe"
          fi

      - name: 上传产物
        uses: actions/upload-artifact@v7
        with:
          name: kenkomqtt-${{ matrix.label }}
          if-no-files-found: error
          path: ${{ runner.temp }}/out/*

  # ---------- Android 生产 APK ----------
  android:
    name: 构建 Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: 安装 JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: 安装 Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ env.APP_DIR }}/pnpm-lock.yaml

      - name: 安装 Rust (Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.APP_DIR }}/src-tauri -> target

      - name: 配置 Android NDK 环境
        run: echo "NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"

      - name: 安装前端依赖
        working-directory: ${{ env.APP_DIR }}
        run: pnpm install

      - name: 初始化 Android 工程
        working-directory: ${{ env.APP_DIR }}
        run: pnpm tauri android init

      - name: 构建 APK（universal + 分架构）
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -euo pipefail
          STAGE="$RUNNER_TEMP/unsigned"; mkdir -p "$STAGE"
          # 1) universal（含全部 ABI）
          pnpm tauri android build --apk
          find src-tauri/gen/android -path '*release*' -name 'app-universal-release-unsigned.apk' -exec cp {} "$STAGE/" \;
          # 2) 按 ABI 拆分（每架构一个小包）
          pnpm tauri android build --apk --split-per-abi
          find src-tauri/gen/android -path '*release*' -name 'app-*-release-unsigned.apk' ! -name 'app-universal-*' -exec cp {} "$STAGE/" \;
          echo "待签名 APK："; ls -lh "$STAGE"

      - name: 生成密钥并签名全部 APK
        run: |
          set -euo pipefail
          KS="$RUNNER_TEMP/ci.jks"
          keytool -genkeypair -v -keystore "$KS" -alias ci -keyalg RSA -keysize 2048 \
            -validity 3650 -storepass android -keypass android \
            -dname "CN=KenkoMQTT CI, O=KenkoMQTT"
          BT="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)"
          OUT="$RUNNER_TEMP/apks"; mkdir -p "$OUT"
          for apk in "$RUNNER_TEMP"/unsigned/*.apk; do
            # app-universal-release-unsigned.apk -> universal；app-arm64-v8a-release-unsigned.apk -> arm64-v8a
            abi="$(basename "$apk" | sed -E 's/^app-(.*)-release-unsigned\.apk$/\1/')"
            "$BT/apksigner" sign --ks "$KS" --ks-pass pass:android --ks-key-alias ci \
              --key-pass pass:android --out "$OUT/kenkomqtt-$abi.apk" "$apk"
            "$BT/apksigner" verify "$OUT/kenkomqtt-$abi.apk"
            echo "已签名: $abi"
          done
          ls -lh "$OUT"

      - name: 上传 universal
        uses: actions/upload-artifact@v7
        with:
          name: kenkomqtt-android-universal
          if-no-files-found: error
          path: ${{ runner.temp }}/apks/kenkomqtt-universal.apk
      - name: 上传 arm64-v8a
        uses: actions/upload-artifact@v7
        with:
          name: kenkomqtt-android-arm64-v8a
          if-no-files-found: error
          path: ${{ runner.temp }}/apks/kenkomqtt-arm64-v8a.apk
      - name: 上传 armeabi-v7a
        uses: actions/upload-artifact@v7
        with:
          name: kenkomqtt-android-armeabi-v7a
          if-no-files-found: error
          path: ${{ runner.temp }}/apks/kenkomqtt-armeabi-v7a.apk
      - name: 上传 x86
        uses: actions/upload-artifact@v7
        with:
          name: kenkomqtt-android-x86
          if-no-files-found: error
          path: ${{ runner.temp }}/apks/kenkomqtt-x86.apk
      - name: 上传 x86_64
        uses: actions/upload-artifact@v7
        with:
          name: kenkomqtt-android-x86_64
          if-no-files-found: error
          path: ${{ runner.temp }}/apks/kenkomqtt-x86_64.apk

  # ---------- iOS 构建（无签名：模拟器 .app）----------
  # 说明：Tauri 的 iOS 生产构建必须走 `tauri ios build`（原始 xcodebuild 会进 dev 路径、依赖 dev server）。
  # 真机 .ipa 的 export 步骤需要签名证书；无 secrets 时只能产出「模拟器 .app」这种免签名产物。
  # 要 CI 直接出可安装到真机的签名 .ipa，需把证书(.p12)+描述文件放 GitHub Secrets 再签（见 README）。
  ios:
    name: 构建 iOS (模拟器·免签名)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: 安装 Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ env.APP_DIR }}/pnpm-lock.yaml

      - name: 安装 Rust (iOS 模拟器 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.APP_DIR }}/src-tauri -> target

      - name: 准备 iOS 构建依赖
        run: brew install xcodegen libimobiledevice

      - name: 安装前端依赖
        working-directory: ${{ env.APP_DIR }}
        run: pnpm install

      - name: 初始化 iOS 工程
        working-directory: ${{ env.APP_DIR }}
        run: pnpm tauri ios init

      - name: 构建模拟器 .app（免签名）
        working-directory: ${{ env.APP_DIR }}
        run: pnpm tauri ios build --target aarch64-sim

      - name: 打包 .app
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -euo pipefail
          APP="$(find src-tauri/gen/apple/build -name '*.app' -type d -path '*sim*' | head -1)"
          echo "app=$APP"
          test -n "$APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$RUNNER_TEMP/KenkoMQTT-iossim.app.zip"

      - name: 上传产物
        uses: actions/upload-artifact@v7
        with:
          name: kenkomqtt-ios-simulator
          if-no-files-found: error
          path: ${{ runner.temp }}/KenkoMQTT-iossim.app.zip

  # ---------- Linux：AppImage / deb / rpm × x86_64 / arm64（原生 runner 构建） ----------
  # Tauri v2 需要 webkit2gtk-4.1（仅 Ubuntu 24.04+ 提供），故在 24.04 上构建；
  # 产物 glibc 下限为 24.04，较老发行版不适用。
  linux:
    name: 构建 Linux ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x86_64
            os: ubuntu-24.04
          - label: arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libssl-dev \
            libsoup-3.0-dev libayatana-appindicator3-dev libxdo-dev \
            patchelf build-essential curl wget file rpm

      - name: 安装 pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: 安装 Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ${{ env.APP_DIR }}/pnpm-lock.yaml

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.APP_DIR }}/src-tauri -> target
          key: linux-${{ matrix.label }}

      - name: 安装前端依赖
        working-directory: ${{ env.APP_DIR }}
        run: pnpm install

      - name: 构建 AppImage / deb / rpm
        working-directory: ${{ env.APP_DIR }}
        env:
          # 避免 GitHub Runner 上 AppImage 打包因缺 FUSE 失败
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
        run: pnpm tauri build --bundles appimage,deb,rpm

      - name: 收集产物
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/out"; mkdir -p "$OUT"
          find src-tauri/target/release/bundle -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \) -exec cp {} "$OUT/" \;
          echo "产物："; ls -lh "$OUT"

      - name: 上传产物
        uses: actions/upload-artifact@v7
        with:
          name: kenkomqtt-linux-${{ matrix.label }}
          if-no-files-found: error
          path: ${{ runner.temp }}/out/*
